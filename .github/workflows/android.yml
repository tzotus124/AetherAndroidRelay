name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java JDK Subsystem
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create Failsafe Specifications
        run: |
          # 1. Manually write a perfectly pre-configured specification layer profile
          cat << 'EOF' > buildozer.spec
          [app]
          title = Aether Wake Relay
          package.name = aetherrelayapp
          package.domain = org.aether
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas
          version = 0.1
          requirements = python3,kivy,flask
          orientation = portrait
          fullscreen = 1
          android.archs = arm64-v8a
          android.allow_backup = True
          
          [buildozer]
          log_level = 2
          warn_on_root = 0
          EOF

      - name: Build Android APK Package Bundle
        uses: Artemonim/buildozer-action@v1
        with:
          command: buildozer -v android debug
          repository_root: .

      - name: Upload Finished APK Asset Archive
        uses: actions/upload-artifact@v4
        with:
          name: AetherRelay_Android_App
          path: bin/*.apk
